<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOERP - 김소은상회(주) 업무 매니지먼트</title>
  <meta name="description" content="SOERP - 김소은상회(주) 건설/공사 행정 업무 관리 대시보드" />
  <link rel="icon" type="image/svg+xml" href="assets/soerp-mark.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <!-- 사이드바 (데스크톱) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <a class="brand-link" href="#/dashboard" aria-label="SOERP 대시보드로 이동">
          <img class="brand-img" src="assets/soerp-logo.svg" alt="SOERP" />
        </a>
        <button class="icon-btn drawer-close" data-action="menu-close" aria-label="메뉴 닫기" data-icon="x"></button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-foot">
        <div class="sidebar-user">
          <span class="user-email" id="sidebar-user-email"></span>
          <button type="button" class="logout-btn" id="logout-btn" title="로그아웃" aria-label="로그아웃" data-icon="logout"></button>
        </div>
        데이터는 Supabase에 계정별로 저장됩니다.<br />
        백업은 Settings의 JSON 내보내기를 이용하세요.
      </div>
    </aside>
    <div class="drawer-dim" id="drawer-dim" data-action="menu-close"></div>

    <div class="content">
      <!-- 헤더 -->
      <header class="header">
        <button class="icon-btn mobile-only" data-action="menu-open" aria-label="메뉴 열기" data-icon="menu"></button>
        <div class="header-search">
          <span class="search-icon" data-icon="search"></span>
          <input type="search" id="header-search" placeholder="업무 검색 후 Enter" aria-label="업무 검색" />
        </div>
        <div class="header-right">
          <span class="header-date desktop-only" id="header-date"></span>
          <button class="btn btn-primary" data-action="open-new">
            <span data-icon="plus"></span><span class="hide-sm">새 업무 추가</span>
          </button>
        </div>
      </header>

      <main class="main" id="view"></main>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="confirm-root"></div>
  <div id="toast-root" class="toast-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/authGuard.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/taskApi.js"></script>
  <script src="js/narajangteo.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
  <script src="js/logout.js"></script>
</body>
</html>
